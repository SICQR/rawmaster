name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install system deps (ffmpeg + libsndfile)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg libsndfile1

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check rawmaster.py app.py companion/daemon.py --ignore E501,E402

      - name: Run unit tests
        run: python -m pytest tests/ -v --tb=short
        env:
          RAWMASTER_SKIP_LICENSE: "1"

  spaces-sync:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Push spaces/ to HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install huggingface_hub
          python - <<'EOF'
          import os
          from huggingface_hub import HfApi

          api = HfApi(token=os.environ["HF_TOKEN"])
          repo_id = "smashd/rawmaster"

          api.upload_folder(
              folder_path="spaces",
              repo_id=repo_id,
              repo_type="space",
              commit_message="Sync from GitHub main",
              ignore_patterns=["__pycache__", "*.pyc", ".DS_Store"],
          )
          print(f"Pushed to https://huggingface.co/spaces/{repo_id}")
          EOF