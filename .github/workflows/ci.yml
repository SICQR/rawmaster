name: RAWMASTER CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Lint + syntax check ──────────────────────────────────────────────────
  lint:
    name: Lint and syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Syntax check
        run: |
          python3 -m py_compile rawmaster.py  && echo "rawmaster.py ✅"
          python3 -m py_compile app.py        && echo "app.py ✅"
          python3 -m py_compile companion/daemon.py && echo "daemon.py ✅"

      - name: Flake8
        run: |
          flake8 rawmaster.py app.py companion/daemon.py \
            --max-line-length=120 \
            --ignore=E501,W503,E402,F401,E226 \
            --count

  # ── Fast tests — no ML model download ───────────────────────────────────
  test-fast:
    name: Fast tests (no model download)
    runs-on: macos-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/pip
          key: ${{ runner.os }}-pip-fast-${{ hashFiles('requirements.txt') }}

      - name: Install fast deps (no torch/demucs)
        run: |
          pip install \
            numpy scipy soundfile pyloudnorm librosa \
            noisereduce requests \
            pytest mido

      - name: Register custom marks
        run: |
          cat > pytest.ini << 'EOF'
          [pytest]
          markers =
              slow: marks tests as slow (deselect with -m "not slow")
          EOF

      - name: Run fast tests
        run: |
          python3 -m pytest tests/test_rawmaster.py \
            -v --tb=short -m "not slow" \
            --junit-xml=test-results/fast.xml
        env:
          RAWMASTER_SKIP_LICENSE: "1"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: fast-test-results
          path: test-results/

  # ── Full pipeline — downloads Demucs + Basic-Pitch models (~110MB) ───────
  test-full:
    name: Full pipeline (Demucs + models)
    runs-on: macos-latest
    needs: test-fast
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/pip
          key: ${{ runner.os }}-pip-full-${{ hashFiles('requirements.txt') }}

      - name: Cache ML models
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/torch
            ~/.cache/basic_pitch
          key: ${{ runner.os }}-models-htdemucs-v1

      - name: Install CPU torch first
        run: |
          pip install torch torchaudio \
            --index-url https://download.pytorch.org/whl/cpu

      - name: Install all deps
        run: pip install -r requirements.txt pytest mido

      - name: Register custom marks
        run: |
          cat > pytest.ini << 'EOF'
          [pytest]
          markers =
              slow: marks tests as slow (deselect with -m "not slow")
          EOF

      - name: Generate test asset
        run: |
          mkdir -p test_assets
          python3 - << 'EOF'
          import numpy as np, soundfile as sf
          sr = 44100
          t  = np.linspace(0, 30, sr * 30)
          audio = (
              np.sin(2*np.pi*60*t)  * np.exp(-5*(t % 0.5)) * 0.7
            + np.sin(2*np.pi*80*t)  * 0.3
            + np.sin(2*np.pi*440*t) * 0.2
            + np.random.normal(0, 0.02, len(t))
          )
          audio /= np.max(np.abs(audio)) * 1.05
          sf.write("test_assets/synthetic_test.wav",
                   np.column_stack([audio, audio * 0.95]), sr)
          print("test asset created")
          EOF

      - name: Run slow tests (Demucs + Basic-Pitch)
        run: |
          python3 -m pytest tests/test_rawmaster.py \
            -v --tb=short -m "slow" -s \
            --junit-xml=test-results/slow.xml \
            --timeout=600
        env:
          RAWMASTER_SKIP_LICENSE: "1"
          RAWMASTER_TEST_SHIFTS: "0"   # 0 shifts in CI — 8× faster, quality sufficient for gate
        timeout-minutes: 20

      - name: Run quality check
        run: |
          python3 rawmaster.py test_assets/synthetic_test.wav --stems --midi
          python3 test_results/quality_check.py
        env:
          RAWMASTER_SKIP_LICENSE: "1"

      - name: Upload pipeline artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: full-pipeline-results
          path: |
            test-results/
            rawmaster_output/

  # ── Deploy to HuggingFace Spaces — only after all tests pass ─────────────
  deploy-spaces:
    name: Deploy HuggingFace Spaces demo
    runs-on: ubuntu-latest
    needs: [test-fast, test-full]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install huggingface_hub
        run: pip install huggingface_hub

      - name: Push to HuggingFace Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python3 - << 'EOF'
          import os
          from huggingface_hub import HfApi

          token   = os.environ["HF_TOKEN"]
          repo_id = "smashd/rawmaster"
          api     = HfApi(token=token)

          api.upload_folder(
              folder_path="spaces/",
              repo_id=repo_id,
              repo_type="space",
              commit_message="Deploy from GitHub Actions",
              ignore_patterns=["__pycache__", "*.pyc", ".DS_Store"],
          )
          print(f"✅ Deployed to https://huggingface.co/spaces/{repo_id}")
          EOF
